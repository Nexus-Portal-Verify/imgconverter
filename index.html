<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Pro | Ultimate Bulk Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #DA291C;
            --secondary: #FFC72C;
            --dark: #1a1a1a;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://images.unsplash.com/photo-1542038784456-1ea8e935640e?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
        }

        .oswald { font-family: 'Oswald', sans-serif; }

        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            border: 3px solid var(--secondary);
            border-radius: 40px;
            color: var(--dark);
            box-shadow: 0 30px 70px rgba(0,0,0,0.6);
        }

        .header-box {
            background: var(--primary);
            color: white;
            padding: 35px;
            border-radius: 35px 35px 0 0;
            text-align: center;
            border-bottom: 6px solid var(--secondary);
        }

        /* Square Option Cards */
        .tool-card {
            background: #fff;
            border: 2px solid #eee;
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border-radius: 20px;
        }

        .tool-card.active {
            border-color: var(--primary);
            background: #fff5f5;
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(218, 41, 28, 0.2);
        }

        .tool-card.active i { color: var(--primary); transform: scale(1.1); }

        .cta-btn {
            background: var(--primary);
            color: white;
            font-weight: 800;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(218, 41, 28, 0.3);
        }

        .progress-bar-fill {
            background: linear-gradient(to right, var(--secondary), #28a745);
            transition: width 0.4s ease;
        }

        /* Toast Message */
        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--dark);
            color: white;
            padding: 18px 35px;
            border-radius: 20px;
            border-left: 8px solid var(--secondary);
            transform: translateX(150%);
            transition: 0.5s;
            z-index: 1000;
            font-weight: 700;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #toast.show { transform: translateX(0); }

        /* Advanced File Card */
        .file-entry {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .preview-img {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
            border: 2px solid var(--secondary);
        }

        .status-badge {
            font-size: 9px;
            font-weight: 900;
            padding: 4px 10px;
            border-radius: 50px;
            text-transform: uppercase;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <div class="glass-card overflow-hidden mb-10">
            <div class="header-box">
                <h1 class="oswald text-5xl uppercase tracking-tighter">NEXUS STUDIO <span class="text-secondary text-2xl align-top">V2</span></h1>
                <p class="font-bold text-yellow-300 tracking-[0.25em] text-[10px]">ULTIMATE HIGH-SPEED BULK ENGINE</p>
            </div>

            <div class="p-6 md:p-10">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                    <div onclick="setMode('png', 'jpeg', 'PNG to JPG', this)" class="tool-card active">
                        <i class="fa-solid fa-file-export text-4xl text-gray-300 mb-3 transition"></i>
                        <h3 class="font-bold text-[10px] uppercase">PNG to JPG</h3>
                    </div>
                    <div onclick="setMode('jpeg', 'png', 'JPG to PNG', this)" class="tool-card">
                        <i class="fa-solid fa-file-image text-4xl text-gray-300 mb-3 transition"></i>
                        <h3 class="font-bold text-[10px] uppercase">JPG to PNG</h3>
                    </div>
                    <div onclick="setMode('webp', 'png', 'WEBP to PNG', this)" class="tool-card">
                        <i class="fa-solid fa-wand-magic-sparkles text-4xl text-gray-300 mb-3 transition"></i>
                        <h3 class="font-bold text-[10px] uppercase">WEBP to PNG</h3>
                    </div>
                    <div onclick="setMode('jpeg', 'webp', 'JPG to WEBP', this)" class="tool-card">
                        <i class="fa-solid fa-bolt text-4xl text-gray-300 mb-3 transition"></i>
                        <h3 class="font-bold text-[10px] uppercase">JPG to WEBP</h3>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div class="bg-gray-50 p-6 rounded-[25px] border border-gray-100">
                        <div class="flex justify-between items-center mb-4">
                            <label class="font-black text-[10px] uppercase tracking-widest text-gray-400">Image Quality</label>
                            <span id="qualityVal" class="font-black text-red-600">90%</span>
                        </div>
                        <input type="range" id="qualityRange" min="10" max="100" value="90" class="w-full accent-red-600 cursor-pointer" oninput="updateQuality(this.value)">
                    </div>
                    <div class="bg-gray-50 p-6 rounded-[25px] border border-gray-100 flex flex-col justify-center">
                        <p class="font-black text-[10px] uppercase tracking-widest text-gray-400 mb-2">Engine Status</p>
                        <p id="engineStat" class="text-green-600 font-bold text-sm italic uppercase tracking-tighter">Ready for upload</p>
                    </div>
                </div>

                <div id="interactionZone">
                    <div id="dropzone" class="border-4 border-dashed border-gray-200 rounded-[40px] p-12 text-center hover:border-red-500 transition cursor-pointer bg-white group" onclick="document.getElementById('bulkInput').click()">
                        <i class="fa-solid fa-cloud-arrow-up text-7xl text-gray-100 mb-4 group-hover:text-red-500 transition duration-500"></i>
                        <h2 id="modeDisplay" class="text-2xl font-black mb-2 uppercase italic tracking-tighter">PNG TO JPG MODE</h2>
                        <p class="text-gray-400 text-xs font-bold uppercase tracking-widest">Supports Multi-File Selection</p>
                        <input type="file" id="bulkInput" class="hidden" multiple accept="image/*">
                    </div>
                </div>

                <div id="processArea" class="hidden mt-8 animate-in fade-in">
                    <div class="flex justify-between items-end mb-4">
                        <div>
                            <span class="font-black text-[10px] uppercase text-gray-400 block mb-1">Global Progress</span>
                            <span id="progressPercent" class="font-black text-4xl text-red-600 tracking-tighter">0%</span>
                        </div>
                        <div class="text-right">
                            <span class="font-black text-[10px] uppercase text-gray-400 block mb-1">Time Elapsed</span>
                            <span id="timer" class="font-bold text-lg text-dark">0.00s</span>
                        </div>
                    </div>
                    
                    <div class="w-full bg-gray-100 h-4 rounded-full overflow-hidden mb-8 border border-gray-200 p-1">
                        <div id="progressBar" class="progress-bar-fill h-full w-0 rounded-full"></div>
                    </div>

                    <div id="fileQueue" class="max-h-[400px] overflow-y-auto pr-3 custom-scrollbar mb-8">
                        </div>

                    <div id="finishArea" class="hidden scale-up-center">
                        <button onclick="downloadAll()" class="cta-btn w-full py-6 rounded-3xl text-xl flex items-center justify-center gap-4 bg-green-600 hover:bg-green-700 shadow-green-100 mb-4">
                            <i class="fa-solid fa-file-zipper"></i> DOWNLOAD ALL AS ZIP
                        </button>
                        <button onclick="location.reload()" class="w-full text-center font-black text-gray-400 text-[10px] uppercase tracking-[0.4em] hover:text-red-600 transition">Start New Task</button>
                    </div>
                </div>
            </div>
        </div>
        
        <footer class="text-center text-gray-500 text-[9px] font-bold uppercase tracking-[0.4em] mb-10">
            &copy; 2026 NEXUS CORE TECHNOLOGIES &bull; BULK STUDIO DIVISION
        </footer>
    </div>

    <div id="toast">Nexus Studio Ready</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        let currentJob = { in: 'png', out: 'jpeg', title: 'PNG to JPG' };
        let processedFiles = [];
        let quality = 0.9;
        let startTime;
        let timerInterval;

        function updateQuality(v) {
            quality = v / 100;
            document.getElementById('qualityVal').innerText = v + '%';
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function setMode(inE, outE, title, el) {
            currentJob = { in: inE, out: outE, title: title };
            document.querySelectorAll('.tool-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('modeDisplay').innerText = title + " MODE";
            showToast("Mode Switched: " + title);
        }

        function startTimer() {
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsed = (Date.now() - startTime) / 1000;
                document.getElementById('timer').innerText = elapsed.toFixed(2) + "s";
            }, 50);
        }

        const bulkInput = document.getElementById('bulkInput');
        bulkInput.onchange = async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            // UI Transitions
            document.getElementById('interactionZone').classList.add('hidden');
            document.getElementById('processArea').classList.remove('hidden');
            document.getElementById('engineStat').innerText = "Processing Bulk Job...";
            document.getElementById('engineStat').className = "text-red-600 font-bold text-sm italic uppercase tracking-tighter";
            
            const queue = document.getElementById('fileQueue');
            queue.innerHTML = '';
            processedFiles = [];

            // 1. Initial Listing
            files.forEach((f, i) => {
                queue.innerHTML += `
                    <div id="row-${i}" class="file-entry">
                        <div class="relative">
                            <img id="prev-${i}" src="https://via.placeholder.com/50?text=..." class="preview-img">
                            <div id="loader-${i}" class="absolute inset-0 flex items-center justify-center bg-black/10 rounded-lg hidden">
                                <i class="fa-solid fa-spinner fa-spin text-white"></i>
                            </div>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-[11px] font-black uppercase truncate text-gray-800 mb-1">${f.name}</p>
                            <div class="flex items-center gap-3">
                                <span class="text-[9px] font-bold text-gray-400 italic">${(f.size/1024).toFixed(1)} KB</span>
                                <span id="time-${i}" class="text-[9px] font-bold text-red-500"></span>
                            </div>
                        </div>
                        <div class="text-right">
                            <span id="st-${i}" class="status-badge bg-gray-100 text-gray-400">Waiting</span>
                        </div>
                    </div>
                `;
            });

            startTimer();

            // 2. Sequential Process (Image by Image)
            for (let i = 0; i < files.length; i++) {
                const fileStart = Date.now();
                const statusLabel = document.getElementById(`st-${i}`);
                const preview = document.getElementById(`prev-${i}`);
                const row = document.getElementById(`row-${i}`);
                const loader = document.getElementById(`loader-${i}`);
                const timeLabel = document.getElementById(`time-${i}`);

                statusLabel.innerText = "Processing";
                statusLabel.className = "status-badge bg-blue-100 text-blue-600";
                loader.classList.remove('hidden');
                row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

                // Process Action
                const data = await convert(files[i]);
                
                processedFiles.push({ 
                    name: files[i].name.split('.')[0] + '.' + currentJob.out, 
                    data: data 
                });

                // Update row info
                const fileEnd = (Date.now() - fileStart) / 1000;
                timeLabel.innerText = `(${fileEnd.toFixed(2)}s)`;
                preview.src = data;
                loader.classList.add('hidden');
                statusLabel.innerText = "Completed";
                statusLabel.className = "status-badge bg-green-100 text-green-700";

                // Global Progress
                const p = Math.round(((i + 1) / files.length) * 100);
                document.getElementById('progressBar').style.width = p + '%';
                document.getElementById('progressPercent').innerText = p + '%';
            }

            clearInterval(timerInterval);
            document.getElementById('engineStat').innerText = "Bulk Process Finished";
            document.getElementById('engineStat').className = "text-green-600 font-bold text-sm italic uppercase tracking-tighter";
            document.getElementById('finishArea').classList.remove('hidden');
            showToast("Success! " + files.length + " Images Ready.");
        };

        function convert(file) {
            return new Promise((resolve) => {
                // Artificial delay to show processing per image (feel of the engine)
                const delay = Math.random() * 200 + 100; 
                setTimeout(() => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            canvas.width = img.width;
                            canvas.height = img.height;
                            const ctx = canvas.getContext('2d');
                            if (currentJob.out === 'jpeg') {
                                ctx.fillStyle = "#ffffff";
                                ctx.fillRect(0, 0, canvas.width, canvas.height);
                            }
                            ctx.drawImage(img, 0, 0);
                            const fmt = `image/${currentJob.out === 'jpg' ? 'jpeg' : currentJob.out}`;
                            resolve(canvas.toDataURL(fmt, quality));
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                }, delay);
            });
        }

        async function downloadAll() {
            const btn = event.currentTarget;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> PACKING ZIP...';
            
            const zip = new JSZip();
            processedFiles.forEach(f => {
                const imgData = f.data.split(',')[1];
                zip.file(f.name, imgData, {base64: true});
            });

            const content = await zip.generateAsync({type: "blob"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(content);
            a.download = `Nexus_Bulk_${Date.now()}.zip`;
            a.click();
            
            btn.innerHTML = '<i class="fa-solid fa-file-zipper mr-2"></i> DOWNLOAD ALL AS ZIP';
            showToast("ZIP Download Started");
        }
    </script>
</body>
</html>
